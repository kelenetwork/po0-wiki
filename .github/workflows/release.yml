name: Release Probe Agent

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.asset_arch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - asset_arch: linux-amd64
            goarch: amd64
            goarm: ''
          - asset_arch: linux-arm64
            goarch: arm64
            goarm: ''
          - asset_arch: linux-armv7
            goarch: arm
            goarm: '7'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: agent/go.mod
          cache-dependency-path: agent/go.sum
      - name: Build agent
        working-directory: agent
        env:
          CGO_ENABLED: '0'
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
        run: go build -ldflags '-s -w' -o ../wiki-probe-agent-${{ matrix.asset_arch }} .
      - name: Calculate sha256
        run: sha256sum wiki-probe-agent-${{ matrix.asset_arch }} > wiki-probe-agent-${{ matrix.asset_arch }}.sha256
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: wiki-probe-agent-${{ matrix.asset_arch }}
          path: |
            wiki-probe-agent-${{ matrix.asset_arch }}
            wiki-probe-agent-${{ matrix.asset_arch }}.sha256

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            scripts/install.sh
            scripts/uninstall.sh
            dist/wiki-probe-agent-linux-amd64
            dist/wiki-probe-agent-linux-amd64.sha256
            dist/wiki-probe-agent-linux-arm64
            dist/wiki-probe-agent-linux-arm64.sha256
            dist/wiki-probe-agent-linux-armv7
            dist/wiki-probe-agent-linux-armv7.sha256
